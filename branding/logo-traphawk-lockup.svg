<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <!-- TrapHawk lockup. Hawk eye watching the line, terminal targeting brackets. -->
  <rect width="640" height="180" rx="12" fill="#0d0d0f"/>

  <!-- targeting brackets -->
  <g stroke="#52525b" stroke-width="3" fill="none" stroke-linecap="square">
    <path d="M34 46 v-12 h12"/>
    <path d="M150 34 h12 v12"/>
    <path d="M162 134 v12 h-12"/>
    <path d="M46 146 h-12 v-12"/>
  </g>

  <!-- hawk eye -->
  <path d="M52 82 Q98 46 144 82 Q98 118 52 82 Z" fill="none" stroke="#f5a524" stroke-width="4" stroke-linejoin="round"/>
  <path d="M98 68 L112 82 L98 96 L84 82 Z" fill="#f5a524"/>

  <!-- the line being watched -->
  <g stroke="#3f3f46" stroke-width="3">
    <line x1="52" y1="126" x2="144" y2="126"/>
    <line x1="68" y1="121" x2="68" y2="131"/>
    <line x1="128" y1="121" x2="128" y2="131"/>
  </g>
  <line x1="98" y1="119" x2="98" y2="133" stroke="#f5a524" stroke-width="3"/>

  <!-- wordmark -->
  <text x="196" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="54" font-weight="700" letter-spacing="2">
    <tspan fill="#f5a524">TRAP</tspan><tspan fill="#e7e5e4">HAWK</tspan>
  </text>
  <text x="198" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" letter-spacing="5.5" fill="#71717a">EVERY PICK ON THE HOUSE LEDGER</text>
</svg>
