<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- TrapHawk primary mark: a hawk in profile whose wing is a rising graph.
       Three sheared feather-bars climb the baseline into the tallest bar,
       which becomes the neck under an angular head with a hooked beak.
       No eye anywhere, per brand rule. -->
  <rect width="240" height="240" rx="28" fill="#0d0d0f"/>
  <line x1="36" y1="200" x2="204" y2="200" stroke="#52525b" stroke-width="6"/>
  <polygon points="48,192 84,192 94,152 58,152" fill="#f5a524" opacity="0.45"/>
  <polygon points="92,192 128,192 138,112 102,112" fill="#f5a524" opacity="0.7"/>
  <polygon points="136,192 172,192 182,72 146,72" fill="#f5a524"/>
  <polygon points="146,72 148,42 174,34 212,56 196,62 182,72" fill="#f5a524"/>
</svg>
