<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
  <!-- Fade the House mark, deliberate palette break. The proof asset is a receipt,
       so this concept prints the brand on receipt paper. One light asset to own
       in a feed full of dark degen graphics. -->
  <rect width="240" height="300" fill="#f4f1ea"/>

  <!-- header -->
  <text x="120" y="42" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" letter-spacing="4" fill="#141414">FADE THE HOUSE</text>
  <line x1="28" y1="58" x2="212" y2="58" stroke="#141414" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- house, struck -->
  <path d="M78 178 V132 L120 96 L162 132 V178 Z" fill="none" stroke="#141414" stroke-width="5" stroke-linejoin="round"/>
  <path d="M108 178 V154 H132 V178" fill="none" stroke="#8a8578" stroke-width="4" stroke-linejoin="round"/>
  <line x1="60" y1="192" x2="180" y2="88" stroke="#f5a524" stroke-width="8" stroke-linecap="round"/>

  <!-- ledger row -->
  <line x1="28" y1="212" x2="212" y2="212" stroke="#141414" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="28" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#141414">EDGE</text>
  <text x="212" y="238" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#141414">+9.6pp</text>

  <!-- graded stamp -->
  <g transform="rotate(-8 120 268)">
    <rect x="66" y="254" width="108" height="28" fill="none" stroke="#f5a524" stroke-width="3"/>
    <text x="120" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" letter-spacing="4" fill="#f5a524">GRADED</text>
  </g>

  <!-- tear line -->
  <line x1="0" y1="297" x2="240" y2="297" stroke="#c9c3b4" stroke-width="3" stroke-dasharray="8 6"/>
</svg>
