<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- TrapHawk mark, concept "Stoop": the hawk's dive rendered as a double
       strike chevron coming down on the trap. No eye. -->
  <rect width="240" height="240" rx="28" fill="#0d0d0f"/>
  <polyline points="56,52 120,120 184,52" fill="none" stroke="#f5a524" stroke-width="20" stroke-linecap="square"/>
  <polyline points="56,98 120,166 184,98" fill="none" stroke="#f5a524" stroke-width="20" stroke-linecap="square" opacity="0.55"/>
  <g stroke="#71717a" stroke-width="10" stroke-linecap="round">
    <line x1="105" y1="185" x2="135" y2="215"/>
    <line x1="135" y1="185" x2="105" y2="215"/>
  </g>
</svg>
