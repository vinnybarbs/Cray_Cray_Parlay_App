<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- TrapHawk primary mark: a hawk soaring in profile, single wing of
       staggered stripes that read as a rising graph, head leveling out at
       the top of the climb with a crescent beak. No eye. -->
  <rect width="240" height="240" rx="28" fill="#0d0d0f"/>
  <path d="M54,158 L130,82 L190,82
           C200,82 208,86 212,92
           C221,97 225,106 222,114
           C220,122 214,128 206,126
           L204,120
           C210,116 212,110 209,105
           L192,104
           L186,114 L180,104
           L172,100 L130,100 L54,176 Z" fill="#f5a524"/>
  <polygon points="50,204 50,190 114,126 114,140" fill="#f5a524" opacity="0.65"/>
  <polygon points="66,210 66,198 102,162 102,174" fill="#f5a524" opacity="0.4"/>
</svg>
