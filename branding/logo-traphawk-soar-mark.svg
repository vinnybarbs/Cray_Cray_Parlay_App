  <polygon points="88,196 118,196 140,88 110,88" fill="#b5802a"/>
  <polygon points="126,200 158,200 188,52 156,52" fill="#f5a524"/>
  <polygon points="24,163 36,152 172,152 172,163" fill="#f5a524"/>
