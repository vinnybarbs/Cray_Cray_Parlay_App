<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <!-- Trap Dodger lockup. A route that steps around the trap and keeps going. -->
  <rect width="640" height="180" rx="12" fill="#0d0d0f"/>

  <!-- the trap -->
  <g stroke="#71717a" stroke-width="7" stroke-linecap="round">
    <line x1="81" y1="102" x2="109" y2="130"/>
    <line x1="109" y1="102" x2="81" y2="130"/>
  </g>

  <!-- the dodge -->
  <path d="M30 116 H60 V60 H130 V116 H148" fill="none" stroke="#f5a524" stroke-width="5" stroke-dasharray="10 8" stroke-linejoin="round"/>
  <circle cx="158" cy="116" r="8" fill="#f5a524"/>

  <!-- wordmark -->
  <text x="196" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="48" font-weight="700" letter-spacing="1">
    <tspan fill="#f5a524">TRAP</tspan><tspan fill="#e7e5e4"> DODGER</tspan>
  </text>
  <text x="198" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" letter-spacing="5.5" fill="#71717a">EVERY PICK ON THE HOUSE LEDGER</text>
</svg>
