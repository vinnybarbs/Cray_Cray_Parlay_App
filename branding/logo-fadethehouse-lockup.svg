<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <!-- Fade the House lockup. House glyph struck through, on-palette Sharp-Quant. -->
  <rect width="640" height="180" rx="12" fill="#0d0d0f"/>

  <!-- house -->
  <path d="M56 134 V86 L98 50 L140 86 V134 Z" fill="none" stroke="#e7e5e4" stroke-width="5" stroke-linejoin="round"/>
  <!-- door -->
  <path d="M86 134 V108 H110 V134" fill="none" stroke="#3f3f46" stroke-width="4" stroke-linejoin="round"/>
  <!-- the fade -->
  <line x1="38" y1="146" x2="158" y2="42" stroke="#f5a524" stroke-width="8" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="196" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="42" font-weight="700" letter-spacing="1">
    <tspan fill="#f5a524">FADE</tspan><tspan fill="#e7e5e4"> THE HOUSE</tspan>
  </text>
  <text x="198" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" letter-spacing="5.5" fill="#71717a">EVERY PICK ON THE HOUSE LEDGER</text>
</svg>
